# Drop-in override for GPS HAT on /dev/ttyAMA0.
# -n = open device immediately, don't wait for a client connection.
# Device is hardcoded: $DEVICES does not expand in ExecStart drop-ins.
# Type=forking (from base unit) requires gpsd to daemonize — do NOT add -N.
# Install to: /etc/systemd/system/gpsd.service.d/override.conf
[Service]
ExecStart=
ExecStart=/usr/sbin/gpsd -n /dev/ttyAMA0
TimeoutStartSec=60
