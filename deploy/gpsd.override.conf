# Drop-in override for gpsd: add -n (open the device immediately, don't wait for a
# client) and point gpsd at the actual GPS device.
#
# REFERENCE TEMPLATE. install.sh writes the live override to
# /etc/systemd/system/gpsd.service.d/override.conf via heredoc, substituting the
# real GPS_DEVICE from .env — so the path below is only an example (the GPS HAT
# enumerates at /dev/ttyAMA0; a USB GPS at /dev/ttyUSB0 or /dev/ttyACM0). There
# must be exactly ONE device ExecStart.
#
# The leading empty `ExecStart=` clears the base unit's ExecStart before ours.
# Type=forking (from the base unit) needs gpsd to daemonize — do NOT add -N.
# $DEVICES does not expand inside an ExecStart drop-in, so the path is literal.
[Service]
ExecStart=
ExecStart=/usr/sbin/gpsd -n /dev/ttyAMA0
TimeoutStartSec=60
