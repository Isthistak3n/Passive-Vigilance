# /etc/modprobe.d/pv-8812au.conf
#
# PV: use the out-of-tree 88XXau driver for the RTL8812AU (full-channel
# monitor support). The in-tree rtw88_8812au has incomplete 5 GHz tx-power
# tables and faults on channel hops (SOURCEERROR flood). See
# docs/wifi-driver-8812au.md.
blacklist rtw88_8812au
blacklist rtw_8812au
