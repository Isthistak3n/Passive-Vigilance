# Append these lines to /etc/kismet/kismet_site.conf when using the
# out-of-tree rtl88XXau driver (see docs/wifi-driver-8812au.md).
#
# Hop at 20 MHz width only. The rtl88XXau driver WARNs
# (rtw_get_scch_by_cch_offset) on every HT40/VHT channel-width set — harmless
# (it never drops the source) but floods the kernel log ~2.5x/sec. 20 MHz still
# visits every frequency (2.4 + 5 GHz incl. DFS) for passive capture, so there
# is no frequency-coverage / situational-awareness loss.
dot11_datasource_opt=ht_channels,false
dot11_datasource_opt=vht_channels,false
