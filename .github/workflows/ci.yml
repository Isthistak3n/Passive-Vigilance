name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            librtlsdr-dev \
            python3-gps \
            gpsd \
            gpsd-clients \
            libgdal-dev \
            libspatialindex-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install "numpy>=1.24,<3"
          pip install pyrtlsdr==0.2.93
          pip install requests aiohttp python-dotenv
          pip install shapely
          pip install fiona
          pip install geopandas
          pip install bleak scapy 2>/dev/null || true

      - name: Fix python3-gps path for virtualenv
        run: |
          echo "$(python3 -c 'import sys; print([p for p in sys.path if "dist-packages" in p][0])')" \
            >> .pth_fix.txt
          python3 -c "
          import sys
          sys.path.insert(0, '/usr/lib/python3/dist-packages')
          import gps
          print('gps module accessible at:', gps.__file__)
          " || echo "gps not accessible via system path — tests will mock it"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: |
            .pytest_cache/
          retention-days: 7
