name: Lint

on:
  push:
    branches: [dev, main]
  # No branches filter on pull_request: the filter matches the PR's BASE
  # branch, so stacked PRs (based on another feature branch) silently ran no
  # checks at all until GitHub retargeted them after the base merged — that is
  # how a lint failure reached main in #222. Every PR runs checks, whatever
  # its base.
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 modules/ scripts/ main.py \
            --max-line-length=100 \
            --ignore=E501,W503,E302,E303,E302,E303,E241,E221,E226,E272,E231,W504,E402 \
            --exclude=__pycache__
