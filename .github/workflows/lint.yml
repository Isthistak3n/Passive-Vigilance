name: Lint

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 modules/ scripts/ main.py \
            --max-line-length=100 \
            --ignore=E501,W503,E302,E303,E302,E303,E241,E221,E226,E272,E231,W504,E402 \
            --exclude=__pycache__
